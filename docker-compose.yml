version: "3.9"

services:

  # ─────────────────────────────────────────────
  # FastAPI — API principal + Jinja2 templates
  # ─────────────────────────────────────────────
  api:
    build: .
    container_name: iafacturas_api
    volumes:
      - .:/app                     # hot-reload en desarrollo
      - uploads_data:/app/uploads  # PDFs subidos
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - OLLAMA_ENABLED=${OLLAMA_ENABLED:-false}
      - MERCADOPAGO_ACCESS_TOKEN=${MERCADOPAGO_ACCESS_TOKEN}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - APP_ENV=${APP_ENV:-production}
      - APP_URL=${APP_URL:-https://iafacturas.dewoc.com}
    # Permite llamar a Ollama corriendo en el host del VPS (mismo patrón que document-ai)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - iafacturas_net

  # ─────────────────────────────────────────────
  # Celery Worker — procesamiento de PDFs en background
  # ─────────────────────────────────────────────
  celery:
    build: .
    container_name: iafacturas_celery
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2 -Q facturas
    volumes:
      - .:/app
      - uploads_data:/app/uploads
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - OLLAMA_ENABLED=${OLLAMA_ENABLED:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - iafacturas_net

  # ─────────────────────────────────────────────
  # PostgreSQL — base de datos principal
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: iafacturas_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iafacturas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-iafacturas_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iafacturas}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - iafacturas_net
    # No exponemos al host — acceso solo desde la red interna Docker

  # ─────────────────────────────────────────────
  # Redis — caché AFIP + cola Celery + rate limiting
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: iafacturas_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - iafacturas_net

  # ─────────────────────────────────────────────
  # Nginx — reverse proxy + static files
  # Puerto 8080 en el host → el Nginx/Apache del VPS
  # hace: iafacturas.dewoc.com → localhost:8080
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: iafacturas_nginx
    ports:
      - "8080:80"   # VPS host-nginx proxea iafacturas.dewoc.com → localhost:8080
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/app/static:ro
      - uploads_data:/app/uploads:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - iafacturas_net

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  iafacturas_net:
    driver: bridge
