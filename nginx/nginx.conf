upstream iafacturas_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;   # PDFs pueden ser grandes
    proxy_read_timeout 120s;    # OCR puede tardar

    # Static files servidos directo por nginx (sin pasar por FastAPI)
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Uploads (solo lectura pública si fuera necesario)
    location /uploads/ {
        alias /app/uploads/;
        internal;               # Solo accesible via X-Accel-Redirect de FastAPI
    }

    # Todo lo demás → FastAPI
    location / {
        proxy_pass http://iafacturas_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
