<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAFacturas — Extracción inteligente de facturas AFIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
        <span class="text-xl font-bold text-blue-600">IAFacturas</span>
        <div class="space-x-4">
            <a href="/auth/login" class="text-gray-600 hover:text-blue-600">Ingresar</a>
            <a href="/auth/register" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Registrarse</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-20 text-center">
        <h1 class="text-5xl font-bold mb-6">
            Extrae datos de tus facturas<br>
            <span class="text-blue-600">con inteligencia artificial</span>
        </h1>
        <p class="text-xl text-gray-600 mb-10">
            Subí tu PDF, obtené CUIT, CAE, importe y validación AFIP en segundos.
        </p>
        <a href="/auth/register" class="bg-blue-600 text-white text-lg px-8 py-4 rounded-xl hover:bg-blue-700 shadow-lg">
            Empezar gratis — 10 facturas/mes
        </a>
    </main>

</body>
</html>
